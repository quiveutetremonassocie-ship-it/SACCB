name: Supabase Keepalive

on:
  schedule:
    # Ping toutes les 3 jours à 9h UTC
    - cron: "0 9 */3 * *"
  workflow_dispatch: # Permet de lancer manuellement si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Edge Function
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -d '{"action":"fetch_public"}' \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/public-api"
          echo " — Supabase keepalive OK"
