name: Rappels inscription automatiques

on:
  schedule:
    # Tous les jours à 8h du matin (heure Paris en été = UTC+2, donc 6h UTC)
    - cron: "0 6 * * *"
  workflow_dispatch: # permet de lancer manuellement pour tester

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier rappels J-30 / J-15 / J-5 / J-1 (saison + tournois)
        run: |
          echo "🕐 Date/heure : $(date -u) UTC"
          echo ""
          echo "📤 Appel de check_reminders..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/public-api" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -d '{"action":"check_reminders"}')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS\:.*//g')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "📨 Réponse (HTTP $STATUS) :"
          echo "$BODY"
          echo ""
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Erreur HTTP $STATUS — le rappel n'a pas pu s'exécuter"
            exit 1
          fi
          if echo "$BODY" | grep -q '"ok":false'; then
            echo "❌ La fonction a renvoyé une erreur"
            exit 1
          fi
          if echo "$BODY" | grep -q 'season_reminder\|tournoi_reminders\|cleanup\|tournois_closed'; then
            echo "✅ Rappels/actions effectués avec succès"
          else
            echo "ℹ️  Aucun rappel à envoyer aujourd'hui (J-30/J-15/J-5/J-1 non atteints)"
          fi
