name: Rappels inscription automatiques

on:
  schedule:
    # Tous les jours à 9h UTC (11h Paris été, 10h hiver)
    - cron: '0 9 * * *'
  workflow_dispatch: # permet de lancer manuellement pour tester

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier rappels J-30 / J-15 / J-5 / J-1 (saison + tournois)
        run: |
          set +e
          echo "📤 Appel de check_reminders..."
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 120 \
            -X POST "https://jsceiujlopxgsjlxbvyu.supabase.co/functions/v1/public-api" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"action":"check_reminders"}')
          echo "HTTP $STATUS"
          cat /tmp/body.txt
          echo ""

      - name: Vérifier backup email mensuel
        run: |
          echo "📤 Appel de check_backup_email..."
          STATUS=$(curl -s -o /tmp/backup.txt -w "%{http_code}" \
            --max-time 60 \
            -X POST "https://jsceiujlopxgsjlxbvyu.supabase.co/functions/v1/public-api" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"action":"check_backup_email"}')
          echo "HTTP $STATUS"
          cat /tmp/backup.txt
          echo ""
