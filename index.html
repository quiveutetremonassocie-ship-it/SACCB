<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACCB - Club de Badminton</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --primary: #3b82f6; --accent: #10b981; --text-main: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Outfit', sans-serif; line-height: 1.6; }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-logo { font-family: 'Bebas Neue'; font-size: 32px; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        section { padding: 120px 20px 60px; max-width: 1100px; margin: 0 auto; }
        h2 { font-family: 'Bebas Neue'; font-size: 48px; margin-bottom: 30px; color: var(--primary); text-transform: uppercase; }
        .card { background: var(--bg-card); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .tournoi-card { background: var(--bg-card); border-radius: 20px; padding: 30px; margin-bottom: 30px; border-left: 8px solid var(--accent); }
        .tournoi-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .tournoi-title { font-family: 'Bebas Neue'; font-size: 32px; }
        .tournoi-date { background: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg-dark); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px 30px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; }
        .admin-panel { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000; overflow-y: auto; padding: 30px; }
        .admin-section { background: var(--bg-card); border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-header { padding: 20px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 24px; background: rgba(255,255,255,0.05); }
        .admin-content { display: none; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">SACCB</a>
        <div class="nav-links">
            <button onclick="document.getElementById('login-modal').style.display='flex'" class="btn" style="width:auto; padding:10px 20px;">ADMIN</button>
        </div>
    </nav>

    <section id="tournois">
        <h2>Tournois à venir</h2>
        <div id="tournois-list">
            <p style="text-align: center; color: var(--text-muted);">Initialisation...</p>
        </div>
    </section>

    <div id="login-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="card" style="max-width:350px; width:100%;">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button onclick="checkAdmin()" class="btn">Connexion</button>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>ADMINISTRATION</h2>
            <button onclick="location.reload()" class="btn" style="width:auto; background:#475569;">Fermer</button>
        </div>

        <div class="admin-section">
            <div class="admin-header" onclick="toggleSec('sec-add')">🏆 CRÉER UN TOURNOI</div>
            <div id="sec-add" class="admin-content" style="display:block;">
                <input type="text" id="adm-name" placeholder="Nom">
                <input type="text" id="adm-date" placeholder="Date">
                <input type="number" id="adm-slots" placeholder="Places">
                <button onclick="addT()" class="btn" style="background:var(--accent)">Publier</button>
            </div>
        </div>

        <div class="admin-section">
            <div class="admin-header" onclick="toggleSec('sec-conf')">⚙️ CONFIGURATION</div>
            <div id="sec-conf" class="admin-content">
                <table><thead><tr><th>Nom</th><th>Date</th><th>Action</th></tr></thead><tbody id="list-conf"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const PASS = "43210";
        const DB_URL = "https://api.jsonstorage.net/v1/json/887754d2-777e-405a-8b17-739343362143";
        let db = { membres: [], inscrits_tournoi: [], config_tournois: [] };

        async function loadData() {
            try {
                const r = await fetch(DB_URL + "?nocache=" + Date.now());
                const data = await r.json();
                if (data) {
                    db.config_tournois = data.config_tournois || [];
                    db.inscrits_tournoi = data.inscrits_tournoi || [];
                    db.membres = data.membres || [];
                }
            } catch (e) { console.error("Erreur DB"); }
            updateUI();
        }

        async function saveData() {
            await fetch(DB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(db) });
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('tournois-list');
            const list = db.config_tournois || [];
            
            if (list.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center;">Aucun tournoi disponible.</div>';
            } else {
                container.innerHTML = list.map(t => {
                    const ins = (db.inscrits_tournoi || []).filter(i => i.tournoiId === t.id);
                    const reste = (parseInt(t.slots) || 0) - ins.length;
                    return `
                    <div class="tournoi-card">
                        <div class="tournoi-header">
                            <h3 class="tournoi-title">${t.name}</h3>
                            <span class="tournoi-date">${t.date}</span>
                        </div>
                        <p style="margin-bottom:15px; color:var(--accent); font-weight:bold;">Places : ${t.slots > 0 ? reste : 'Libre'}</p>
                        <form onsubmit="regT(event, '${t.id}', '${t.name}')">
                            <input type="text" name="p" placeholder="Joueurs" required>
                            <button type="submit" class="btn" style="background:var(--accent); padding:10px;">S'inscrire</button>
                        </form>
                    </div>`;
                }).join('');
            }
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('list-conf').innerHTML = (db.config_tournois || []).map(t => `<tr><td>${t.name}</td><td>${t.date}</td><td><button onclick="delT('${t.id}')">❌</button></td></tr>`).join('');
        }

        async function addT() {
            const n = document.getElementById('adm-name').value;
            const d = document.getElementById('adm-date').value;
            const s = document.getElementById('adm-slots').value;
            if (n && d) {
                db.config_tournois.push({ id: Date.now().toString(), name: n, date: d, slots: s || 0 });
                await saveData();
                alert("Tournoi ajouté !");
            }
        }

        async function regT(e, id, name) {
            e.preventDefault();
            db.inscrits_tournoi.push({ id: Date.now().toString(), tournoiId: id, tournoiName: name, p: e.target.p.value });
            await saveData();
            alert("Inscrit !");
        }

        async function delT(id) { db.config_tournois = db.config_tournois.filter(t=>t.id!==id); await saveData(); }
        function checkAdmin() { if(document.getElementById('pass').value === PASS) { document.getElementById('login-modal').style.display='none'; document.getElementById('admin-panel').style.display='block'; updateUI(); } }
        function toggleSec(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }

        loadData();
    </script>
</body>
</html>
